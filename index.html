<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Franchisee Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--card:#e8f0fe;--card-hover:#dce8fc;
  --border:#c8d6e5;--border-light:#dfe6ed;
  --text:#1a2332;--muted:#6b7c93;--muted2:#9aacbf;
  --blue:#2563eb;--blue-light:#dbeafe;--blue-dark:#1e40af;
  --green:#059669;--green-light:#d1fae5;--green-dark:#065f46;
  --yellow:#d97706;--yellow-light:#fef3c7;
  --red:#dc2626;--red-light:#fee2e2;
  --orange:#ea580c;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.08);
}
html,body{min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
::selection{background:var(--blue);color:#fff;}
input,select,textarea,button{font-family:inherit;}
.header{background:var(--surface);border-bottom:1px solid var(--border-light);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;letter-spacing:1px;}
.logo-text{font-weight:800;font-size:17px;letter-spacing:2px;color:var(--text);}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-left:6px;font-weight:600;}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--blue);color:var(--blue);box-shadow:var(--shadow);}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dark);box-shadow:var(--shadow-lg);}
.btn-sm{padding:6px 12px;font-size:11px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:20px 24px;max-width:1400px;margin:0 auto;}
.tracker{background:var(--surface);border-radius:12px;border:1px solid var(--border-light);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s;}
.tracker:hover{box-shadow:var(--shadow-lg);}
.tracker-head{background:var(--card);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);}
.tracker-info h3{font-size:15px;font-weight:700;color:var(--text);}
.tracker-info p{font-size:11px;color:var(--muted);margin-top:2px;}
.tracker-pct{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--blue);}
.tracker-bar{height:4px;background:var(--border-light);margin:0;}
.tracker-fill{height:100%;background:linear-gradient(90deg,var(--blue),#7c3aed);border-radius:0;transition:width .4s;}
.steps{padding:10px 14px;}
.step{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:2px;}
.step:hover{background:var(--card);border-color:var(--border-light);}
.step.done{background:var(--green-light);border-color:rgba(5,150,105,0.15);}
.step.done .step-check{background:var(--green);border-color:var(--green);color:#fff;}
.step.done .step-text{color:var(--green-dark);text-decoration:line-through;text-decoration-color:rgba(5,150,105,0.3);}
.step-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .15s;background:var(--surface);}
.step:hover .step-check{border-color:var(--blue);}
.step-text{font-size:13px;flex:1;line-height:1.3;}
.step-req{font-size:8px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;background:rgba(234,88,12,0.08);padding:2px 5px;border-radius:3px;}
.step-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);min-width:18px;}
.tracker-foot{padding:10px 14px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;}
.tracker-foot span{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.remove-btn{font-size:10px;color:var(--muted2);cursor:pointer;border:none;background:none;padding:2px 6px;}
.remove-btn:hover{color:var(--red);}
.add-card{border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;cursor:pointer;transition:all .15s;background:transparent;}
.add-card:hover{border-color:var(--blue);background:rgba(37,99,235,0.03);}
.add-card span{font-size:28px;color:var(--muted2);margin-bottom:6px;}
.add-card p{font-size:12px;color:var(--muted);font-weight:600;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:28px;width:420px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;}
.m-field{margin-bottom:12px;}
.m-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.m-field input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:13px;outline:none;color:var(--text);background:var(--surface);}
.m-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.m-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.steps-editor{display:flex;flex-direction:column;gap:4px;max-height:350px;overflow-y:auto;margin-bottom:10px;}
.se-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);}
.se-row input{flex:1;background:transparent;border:none;color:var(--text);font-size:12px;outline:none;}
.se-handle{color:var(--muted2);cursor:grab;font-size:14px;}
.se-req{font-size:8px;color:var(--orange);font-weight:700;cursor:pointer;padding:3px 6px;border:1px solid rgba(234,88,12,0.2);border-radius:4px;white-space:nowrap;}
.se-req.active{background:rgba(234,88,12,0.1);}
.se-del{color:var(--muted2);cursor:pointer;font-size:14px;padding:0 4px;}
.se-del:hover{color:var(--red);}
.add-step-row{display:flex;gap:6px;margin-top:6px;}
.add-step-row input{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:12px;outline:none;color:var(--text);}
.add-step-row input:focus{border-color:var(--blue);}
@media(max-width:600px){.grid{grid-template-columns:1fr;padding:12px;}}
</style>
</head>
<body>
<div class="header"><div class="logo"><div class="logo-mark">A</div><span class="logo-text">AIRA</span><span class="logo-sub">Franchisee Onboarding</span></div><div class="header-actions"><button class="btn" onclick="openSettings()">⚙ Edit Steps</button><button class="btn btn-primary" onclick="openAdd()">+ Add</button></div></div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="addModal"><div class="modal"><h2>Add Franchisee</h2><div class="m-field"><label>Name</label><input id="a-name" placeholder="John & Jane Smith"></div><div class="m-field"><label>Location</label><input id="a-loc" placeholder="Austin, TX"></div><div class="m-actions"><button class="btn" onclick="closeAdd()">Cancel</button><button class="btn btn-primary" onclick="doAdd()">Add</button></div></div></div>
<div class="modal-overlay" id="settingsModal"><div class="modal" style="width:480px;"><h2>Edit Checklist Steps</h2><p style="font-size:11px;color:var(--muted);margin-bottom:12px;">Drag to reorder. Click REQ/opt to toggle required. New franchisees get updated steps automatically.</p><div class="steps-editor" id="stepsEditor"></div><div class="add-step-row"><input id="newStepInput" placeholder="New step name..." onkeydown="if(event.key==='Enter')addNewStep()"><button class="btn btn-sm btn-primary" onclick="addNewStep()">+ Add</button></div><div class="m-actions" style="margin-top:14px;"><button class="btn btn-sm" style="color:var(--red);border-color:rgba(220,38,38,0.3);" onclick="resetSteps()">Reset</button><div style="flex:1"></div><button class="btn" onclick="closeSettings()">Cancel</button><button class="btn btn-primary" onclick="saveSettings()">Save</button></div></div></div>
<script>
const DEFAULT_STEPS=[{id:'training_portal',label:'Added to Training Portal \u2014 "Start Here" & Finding a Space',required:false},{id:'lease_signed',label:'Lease Signed',required:false},{id:'equipment_ordered',label:'Equipment Ordered',required:false},{id:'vp_intro',label:'VP Intro Text + Roadmap (5-Day & Compliance)',required:true},{id:'sign_ordered',label:'Inside/Outside Sign Ordered',required:false},{id:'access_control',label:'Gym Access Control Ordered',required:false},{id:'facebook',label:'Facebook Account Created',required:false},{id:'instagram',label:'Instagram Account Created',required:false},{id:'email',label:'Email Created',required:false},{id:'website',label:'Website Created',required:false},{id:'stripe',label:'Stripe & Equipment Delivered',required:false},{id:'gymmaster',label:'GymMaster Account',required:false},{id:'ad_account',label:'Ad Account Made',required:false},{id:'compliance',label:'Compliance Check',required:true},{id:'grand_opening',label:'Grand Opening',required:false}];
let checklist=JSON.parse(localStorage.getItem('aira_qt_steps'))||JSON.parse(JSON.stringify(DEFAULT_STEPS));let trackers=JSON.parse(localStorage.getItem('aira_qt_data'))||getSample();let editSteps=[];
function save(){localStorage.setItem('aira_qt_data',JSON.stringify(trackers));localStorage.setItem('aira_qt_steps',JSON.stringify(checklist));}
function getSample(){return [{id:'t1',name:'Marcus & Tina Rivera',location:'San Antonio, TX',steps:{training_portal:true,lease_signed:true,equipment_ordered:true,vp_intro:true,sign_ordered:false,access_control:false,facebook:false,instagram:false,email:false,website:false,stripe:false,gymmaster:false,ad_account:false,compliance:false,grand_opening:false}},{id:'t2',name:'Derek Washington',location:'Memphis, TN',steps:{training_portal:false,lease_signed:false,equipment_ordered:false,vp_intro:false,sign_ordered:false,access_control:false,facebook:false,instagram:false,email:false,website:false,stripe:false,gymmaster:false,ad_account:false,compliance:false,grand_opening:false}},{id:'t3',name:'Kristen Park',location:'Boise, ID',steps:{training_portal:true,lease_signed:true,equipment_ordered:true,vp_intro:true,sign_ordered:true,access_control:true,facebook:true,instagram:true,email:true,website:true,stripe:true,gymmaster:true,ad_account:true,compliance:false,grand_opening:false}}];}
function pct(t){const keys=checklist.map(s=>s.id);const done=keys.filter(k=>t.steps[k]).length;return Math.round(done/keys.length*100);}
function render(){const g=document.getElementById('grid');g.innerHTML=trackers.map(t=>{const p=pct(t);const doneCount=checklist.filter(s=>t.steps[s.id]).length;checklist.forEach(s=>{if(!(s.id in t.steps))t.steps[s.id]=false;});let stepsHtml=checklist.map((s,i)=>{const done=t.steps[s.id];return '<div class="step '+(done?'done':'')+'" onclick="toggle(\''+t.id+'\',\''+s.id+'\')"><span class="step-num">'+(i+1)+'</span><div class="step-check">'+(done?'\u2713':'')+'</div><span class="step-text">'+s.label+'</span>'+(s.required?'<span class="step-req">REQ</span>':'')+'</div>';}).join('');return '<div class="tracker"><div class="tracker-head"><div class="tracker-info"><h3>'+t.name+'</h3><p>'+t.location+'</p></div><div class="tracker-pct">'+p+'%</div></div><div class="tracker-bar"><div class="tracker-fill" style="width:'+p+'%"></div></div><div class="steps">'+stepsHtml+'</div><div class="tracker-foot"><span>'+doneCount+' of '+checklist.length+' complete</span><button class="remove-btn" onclick="removeTracker(\''+t.id+'\')">'+'Remove</button></div></div>';}).join('');g.innerHTML+='<div class="add-card" onclick="openAdd()"><span>+</span><p>Add Franchisee</p></div>';}
function toggle(tid,sid){const t=trackers.find(x=>x.id===tid);t.steps[sid]=!t.steps[sid];save();render();}
function removeTracker(tid){if(!confirm('Remove this tracker?'))return;trackers=trackers.filter(x=>x.id!==tid);save();render();}
function openAdd(){document.getElementById('addModal').classList.add('show');}
function closeAdd(){document.getElementById('addModal').classList.remove('show');}
function doAdd(){const name=document.getElementById('a-name').value.trim();const loc=document.getElementById('a-loc').value.trim();if(!name||!loc){alert('Name and location required.');return;}const steps={};checklist.forEach(s=>steps[s.id]=false);trackers.push({id:'t'+Date.now(),name,location:loc,steps});save();closeAdd();render();document.getElementById('a-name').value='';document.getElementById('a-loc').value='';}
function openSettings(){editSteps=JSON.parse(JSON.stringify(checklist));renderEditor();document.getElementById('settingsModal').classList.add('show');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function renderEditor(){document.getElementById('stepsEditor').innerHTML=editSteps.map((s,i)=>'<div class="se-row" draggable="true" data-idx="'+i+'" ondragstart="ds(event,'+i+')" ondragover="event.preventDefault()" ondrop="dp(event,'+i+')"><span class="se-handle">\u283f</span><input value="'+s.label+'" oninput="editSteps['+i+'].label=this.value"><span class="se-req '+(s.required?'active':'')+'" onclick="editSteps['+i+'].required=!editSteps['+i+'].required;renderEditor();">'+(s.required?'REQ':'opt')+'</span><span class="se-del" onclick="editSteps.splice('+i+',1);renderEditor();">\u2715</span></div>').join('');}
let di=null;function ds(e,i){di=i;e.dataTransfer.effectAllowed='move';}function dp(e,i){e.preventDefault();if(di===null||di===i)return;const item=editSteps.splice(di,1)[0];editSteps.splice(i,0,item);di=null;renderEditor();}
function addNewStep(){const inp=document.getElementById('newStepInput');const label=inp.value.trim();if(!label)return;editSteps.push({id:'c'+Date.now(),label,required:false});inp.value='';renderEditor();}
function saveSettings(){editSteps.forEach((s,i)=>{if(!s.id)s.id='s'+i+'_'+Date.now();});checklist=JSON.parse(JSON.stringify(editSteps));trackers.forEach(t=>{checklist.forEach(s=>{if(!(s.id in t.steps))t.steps[s.id]=false;});});save();closeSettings();render();}
function resetSteps(){if(!confirm('Reset to default 15 steps?'))return;editSteps=JSON.parse(JSON.stringify(DEFAULT_STEPS));renderEditor();}
render();
</script>
</body>
</html>
