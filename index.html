<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA - Franchisee Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--card:#e8f0fe;--card-hover:#dce8fc;
  --border:#c8d6e5;--border-light:#dfe6ed;
  --text:#1a2332;--muted:#6b7c93;--muted2:#9aacbf;
  --blue:#2563eb;--blue-light:#dbeafe;--blue-dark:#1e40af;
  --green:#059669;--green-light:#d1fae5;--green-dark:#065f46;
  --yellow:#d97706;--yellow-light:#fef3c7;
  --red:#dc2626;--red-light:#fee2e2;
  --orange:#ea580c;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.08);
}
html,body{min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
::selection{background:var(--blue);color:#fff;}
input,select,textarea,button{font-family:inherit;}

.header{background:var(--surface);border-bottom:1px solid var(--border-light);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;letter-spacing:1px;}
.logo-text{font-weight:800;font-size:17px;letter-spacing:2px;color:var(--text);}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-left:6px;font-weight:600;}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--blue);color:var(--blue);box-shadow:var(--shadow);}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dark);box-shadow:var(--shadow-lg);}
.btn-sm{padding:6px 12px;font-size:11px;}

.loading{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--muted);font-size:14px;font-weight:600;letter-spacing:1px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:20px 24px;max-width:1400px;margin:0 auto;}

.tracker{background:var(--surface);border-radius:12px;border:1px solid var(--border-light);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s;}
.tracker:hover{box-shadow:var(--shadow-lg);}
.tracker-head{background:var(--card);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);}
.tracker-info h3{font-size:15px;font-weight:700;color:var(--text);}
.tracker-info p{font-size:11px;color:var(--muted);margin-top:2px;}
.tracker-pct{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--blue);}
.tracker-bar{height:4px;background:var(--border-light);margin:0;}
.tracker-fill{height:100%;background:linear-gradient(90deg,var(--blue),#7c3aed);border-radius:0;transition:width .4s;}

.steps{padding:10px 14px;}
.step{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:2px;}
.step:hover{background:var(--card);border-color:var(--border-light);}
.step.done{background:var(--green-light);border-color:rgba(5,150,105,0.15);}
.step.done .step-check{background:var(--green);border-color:var(--green);color:#fff;}
.step.done .step-text{color:var(--green-dark);text-decoration:line-through;text-decoration-color:rgba(5,150,105,0.3);}
.step-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .15s;background:var(--surface);}
.step:hover .step-check{border-color:var(--blue);}
.step-text{font-size:13px;flex:1;line-height:1.3;}
.step-req{font-size:8px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;background:rgba(234,88,12,0.08);padding:2px 5px;border-radius:3px;}
.step-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);min-width:18px;}

.tracker-foot{padding:10px 14px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;}
.tracker-foot span{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.remove-btn{font-size:10px;color:var(--muted2);cursor:pointer;border:none;background:none;padding:2px 6px;}
.remove-btn:hover{color:var(--red);}

.add-card{border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;cursor:pointer;transition:all .15s;background:transparent;}
.add-card:hover{border-color:var(--blue);background:rgba(37,99,235,0.03);}
.add-card span{font-size:28px;color:var(--muted2);margin-bottom:6px;}
.add-card p{font-size:12px;color:var(--muted);font-weight:600;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:28px;width:420px;max-width:90vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;}
.m-field{margin-bottom:12px;}
.m-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.m-field input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:13px;outline:none;color:var(--text);background:var(--surface);}
.m-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
.m-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

.steps-editor{display:flex;flex-direction:column;gap:4px;max-height:350px;overflow-y:auto;margin-bottom:10px;}
.se-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius);}
.se-row input{flex:1;background:transparent;border:none;color:var(--text);font-size:12px;outline:none;}
.se-handle{color:var(--muted2);cursor:grab;font-size:14px;}
.se-req{font-size:8px;color:var(--orange);font-weight:700;cursor:pointer;padding:3px 6px;border:1px solid rgba(234,88,12,0.2);border-radius:4px;white-space:nowrap;}
.se-req.active{background:rgba(234,88,12,0.1);}
.se-del{color:var(--muted2);cursor:pointer;font-size:14px;padding:0 4px;}
.se-del:hover{color:var(--red);}
.add-step-row{display:flex;gap:6px;margin-top:6px;}
.add-step-row input{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:12px;outline:none;color:var(--text);}
.add-step-row input:focus{border-color:var(--blue);}

.sync-indicator{font-size:10px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

@media(max-width:600px){.grid{grid-template-columns:1fr;padding:12px;}}

/* DRAG REORDER */
.se-row{cursor:grab;}
.se-row.dragging{opacity:.4;background:var(--blue-light);}
.se-row.drag-over{border-top:2px solid var(--blue);}
.se-move{display:flex;flex-direction:column;gap:1px;color:var(--muted2);cursor:grab;padding:0 2px;}
.se-move span{display:block;width:12px;height:2px;background:var(--muted2);border-radius:1px;}

/* NOTES */
.notes-section{padding:8px 14px 14px;border-top:1px solid var(--border-light);}
.notes-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
.notes-box{width:100%;min-height:50px;padding:8px 10px;border:1px solid var(--border-light);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--bg);resize:vertical;outline:none;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.4;}
.notes-box:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.08);}
.notes-box::placeholder{color:var(--muted2);}
.notes-saved{font-size:9px;color:var(--green);font-weight:600;opacity:0;transition:opacity .3s;margin-left:8px;}
.notes-saved.show{opacity:1;}

/* ── UNICORN ── */
.unicorn-scene{position:fixed;bottom:0;left:0;right:0;height:110px;pointer-events:none;z-index:999;overflow:hidden;}
.grass-layer{position:absolute;bottom:0;left:0;right:0;}
.grass-back{height:22px;background:linear-gradient(0deg,#15803d,#22c55e);border-radius:6px 6px 0 0;}
.grass-front{position:absolute;bottom:0;left:0;right:0;height:16px;background:linear-gradient(0deg,#16a34a,#4ade80);}
.unicorn-walk{position:absolute;bottom:16px;animation:unicornWalk 22s linear infinite;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.1));}
@keyframes unicornWalk{0%{left:-120px;}100%{left:calc(100% + 120px);}}
.unicorn-svg{animation:unicornBounce .5s ease-in-out infinite;transform-origin:bottom center;}
@keyframes unicornBounce{0%,100%{transform:translateY(0) rotate(0deg);}25%{transform:translateY(-4px) rotate(-0.5deg);}75%{transform:translateY(-2px) rotate(0.5deg);}}
.sparkle-field{position:absolute;bottom:20px;left:-40px;width:50px;height:40px;}
.sparkle-particle{position:absolute;border-radius:50%;animation:sparkFloat 1.2s ease-out infinite;}
.sparkle-particle:nth-child(1){width:4px;height:4px;background:radial-gradient(circle,#fde68a,#fbbf24);top:5px;left:10px;animation-delay:0s;}
.sparkle-particle:nth-child(2){width:3px;height:3px;background:radial-gradient(circle,#c4b5fd,#8b5cf6);top:15px;left:25px;animation-delay:.2s;}
.sparkle-particle:nth-child(3){width:5px;height:5px;background:radial-gradient(circle,#fbcfe8,#ec4899);top:8px;left:40px;animation-delay:.4s;}
.sparkle-particle:nth-child(4){width:3px;height:3px;background:radial-gradient(circle,#bfdbfe,#3b82f6);top:25px;left:15px;animation-delay:.6s;}
.sparkle-particle:nth-child(5){width:4px;height:4px;background:radial-gradient(circle,#fde68a,#f59e0b);top:30px;left:35px;animation-delay:.8s;}
.sparkle-particle:nth-child(6){width:2px;height:2px;background:radial-gradient(circle,#a5f3fc,#06b6d4);top:2px;left:30px;animation-delay:.3s;}
@keyframes sparkFloat{0%{opacity:1;transform:scale(1) translateY(0);}40%{opacity:.8;transform:scale(1.4) translateY(-5px);}100%{opacity:0;transform:scale(0) translateY(-15px);}}
.star-sparkle{position:absolute;animation:starTwinkle 2s ease-in-out infinite;}
.star-sparkle::before,.star-sparkle::after{content:'';position:absolute;background:#fde68a;}
.star-sparkle::before{width:2px;height:8px;left:3px;top:0;border-radius:1px;}
.star-sparkle::after{width:8px;height:2px;left:0;top:3px;border-radius:1px;}
.star-sparkle:nth-child(1){top:-15px;left:25px;animation-delay:0s;}
.star-sparkle:nth-child(2){top:-8px;left:45px;animation-delay:.7s;transform:scale(.7);}
.star-sparkle:nth-child(3){top:-20px;left:10px;animation-delay:1.4s;transform:scale(.5);}
@keyframes starTwinkle{0%,100%{opacity:0;transform:scale(.3) rotate(0deg);}50%{opacity:1;transform:scale(1) rotate(45deg);}}
.rainbow-poop{position:absolute;bottom:22px;opacity:0;display:flex;flex-direction:column;align-items:center;gap:3px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.12));}
.rainbow-poop.p1{left:22%;animation:poopAppear 22s linear infinite;}
.rainbow-poop.p2{left:48%;animation:poopAppear 22s linear infinite 7.3s;}
.rainbow-poop.p3{left:74%;animation:poopAppear 22s linear infinite 14.6s;}
@keyframes poopAppear{0%,28%{opacity:0;transform:translateY(0) scale(0);}30%{opacity:1;transform:translateY(0) scale(1.2);}32%{transform:translateY(-3px) scale(1) rotate(-8deg);}34%{transform:translateY(0) scale(1.05) rotate(4deg);}36%{transform:translateY(-1px) scale(1) rotate(0deg);}52%{opacity:1;transform:translateY(-2px) scale(1);}62%{opacity:0;transform:translateY(-12px) scale(.7);}100%{opacity:0;}}
.rp-icon{font-size:20px;line-height:1;}
.rp-label{font-size:9px;font-weight:800;background:linear-gradient(90deg,#7c3aed,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;}
.rainbow-trail{position:absolute;bottom:24px;height:6px;border-radius:3px;background:linear-gradient(90deg,#ef4444,#f97316,#eab308,#22c55e,#3b82f6,#8b5cf6);opacity:0;filter:blur(0.3px);}
.rainbow-trail.t1{left:20%;animation:trailFade 22s linear infinite;}
.rainbow-trail.t2{left:46%;animation:trailFade 22s linear infinite 7.3s;}
.rainbow-trail.t3{left:72%;animation:trailFade 22s linear infinite 14.6s;}
@keyframes trailFade{0%,28%{opacity:0;width:0;}30%{opacity:.5;width:0;}37%{opacity:.4;width:50px;}50%{opacity:0;width:70px;}100%{opacity:0;}}
.flower{position:absolute;bottom:14px;}
.flower svg{animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
.butterfly{position:absolute;animation:flyAround 12s ease-in-out infinite;}
.butterfly svg{animation:wingFlap .3s ease-in-out infinite alternate;}
@keyframes flyAround{0%{bottom:50px;left:10%;opacity:0;}5%{opacity:1;}25%{bottom:70px;left:30%;}50%{bottom:45px;left:55%;}75%{bottom:75px;left:75%;}95%{opacity:1;}100%{bottom:55px;left:95%;opacity:0;}}
@keyframes wingFlap{0%{transform:scaleX(1);}100%{transform:scaleX(.3);}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span class="logo-text">AIRA</span>
    <span class="logo-sub">Franchisee Onboarding</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="sync-indicator"><div class="sync-dot"></div> Live Sync</div>
    <div class="header-actions">
      <button class="btn" onclick="openSettings()">&#9881; Edit Steps</button>
      <button class="btn btn-primary" onclick="openAdd()">+ Add</button>
    </div>
  </div>
</div>

<div class="loading" id="loadingState">Loading franchisees...</div>
<div class="grid" id="grid" style="display:none;"></div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add Franchisee</h2>
    <div class="m-field"><label>Name</label><input id="a-name" placeholder="John & Jane Smith"></div>
    <div class="m-field"><label>Location</label><input id="a-loc" placeholder="Austin, TX"></div>
    <div class="m-actions">
      <button class="btn" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-primary" id="addBtn" onclick="doAdd()">Add</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="width:480px;">
    <h2>Edit Checklist Steps</h2>
    <p style="font-size:11px;color:var(--muted);margin-bottom:12px;">Edit step names or toggle required. Changes apply to all franchisees in real time.</p>
    <div class="steps-editor" id="stepsEditor"></div>
    <div class="add-step-row">
      <input id="newStepInput" placeholder="New step name..." onkeydown="if(event.key==='Enter')addNewStep()">
      <button class="btn btn-sm btn-primary" onclick="addNewStep()">+ Add</button>
    </div>
    <div class="m-actions" style="margin-top:14px;">
      <button class="btn" onclick="closeSettings()">Done</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ntlfpevmeesjjgoinghi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50bGZwZXZtZWVzampnb2luZ2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTgxNDUsImV4cCI6MjA5MDQ3NDE0NX0.GLDunwLJyFozfYtvIo9pZ-UcLajDODLrFGiLDdFjDNU';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let steps = [];
let franchisees = [];
let stepCompletions = {};

// ── LOAD DATA ──
async function loadAll() {
  const [stepsRes, franchiseesRes, completionsRes] = await Promise.all([
    sb.from('checklist_steps').select('*').order('sort_order'),
    sb.from('franchisees').select('*').order('created_at'),
    sb.from('franchisee_steps').select('*')
  ]);
  steps = stepsRes.data || [];
  franchisees = franchiseesRes.data || [];
  stepCompletions = {};
  (completionsRes.data || []).forEach(c => {
    if (!stepCompletions[c.franchisee_id]) stepCompletions[c.franchisee_id] = {};
    stepCompletions[c.franchisee_id][c.step_id] = c.completed;
  });
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
  render();
}

// ── REAL-TIME SUBSCRIPTIONS ──
sb.channel('onboarding-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'franchisees' }, () => { if(!(document.activeElement && document.activeElement.classList.contains('notes-box'))) loadAll(); })
  .on('postgres_changes', { event: '*', schema: 'public', table: 'franchisee_steps' }, () => loadAll())
  .on('postgres_changes', { event: '*', schema: 'public', table: 'checklist_steps' }, () => loadAll())
  .subscribe();

// ── RENDER ──
function pct(fid) {
  const comp = stepCompletions[fid] || {};
  const done = steps.filter(s => comp[s.id]).length;
  return steps.length ? Math.round(done / steps.length * 100) : 0;
}

function render() {
  if (document.activeElement && document.activeElement.classList.contains('notes-box')) return;
  const g = document.getElementById('grid');
  g.innerHTML = franchisees.map(f => {
    const p = pct(f.id);
    const comp = stepCompletions[f.id] || {};
    const doneCount = steps.filter(s => comp[s.id]).length;
    let stepsHtml = steps.map((s, i) => {
      const done = comp[s.id] || false;
      return `<div class="step ${done ? 'done' : ''}" onclick="toggleStep('${f.id}','${s.id}',${!done})">
        <span class="step-num">${i + 1}</span>
        <div class="step-check">${done ? '✓' : ''}</div>
        <span class="step-text">${s.label}</span>
        ${s.required ? '<span class="step-req">REQ</span>' : ''}
      </div>`;
    }).join('');
    return `<div class="tracker">
      <div class="tracker-head">
        <div class="tracker-info"><h3>${f.name}</h3><p>${f.location}</p></div>
        <div class="tracker-pct">${p}%</div>
      </div>
      <div class="tracker-bar"><div class="tracker-fill" style="width:${p}%"></div></div>
      <div class="steps">${stepsHtml}</div>
      <div class="notes-section">
        <div style="display:flex;align-items:center;"><span class="notes-label">Notes</span><span class="notes-saved" id="ns-${f.id}">Saved</span></div>
        <textarea class="notes-box" id="nb-${f.id}" placeholder="Add notes..." onblur="saveNotes('${f.id}',this.value)">${f.notes||''}</textarea>
      </div>
      <div class="tracker-foot">
        <span>${doneCount} of ${steps.length} complete</span>
        <button class="remove-btn" onclick="removeFranchisee('${f.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
  g.innerHTML += `<div class="add-card" onclick="openAdd()"><span>+</span><p>Add Franchisee</p></div>`;
}

// ── TOGGLE STEP ──
async function toggleStep(fid, sid, val) {
  // Optimistic UI update
  if (!stepCompletions[fid]) stepCompletions[fid] = {};
  stepCompletions[fid][sid] = val;
  render();
  // Upsert to DB
  await sb.from('franchisee_steps').upsert({
    franchisee_id: fid,
    step_id: sid,
    completed: val,
    updated_at: new Date().toISOString()
  }, { onConflict: 'franchisee_id,step_id' });
}

// ── ADD FRANCHISEE ──
function openAdd() { document.getElementById('addModal').classList.add('show'); }
function closeAdd() { document.getElementById('addModal').classList.remove('show'); }
async function doAdd() {
  const name = document.getElementById('a-name').value.trim();
  const loc = document.getElementById('a-loc').value.trim();
  if (!name || !loc) { alert('Name and location required.'); return; }
  document.getElementById('addBtn').textContent = 'Adding...';
  const { data, error } = await sb.from('franchisees').insert({ name, location: loc }).select().single();
  if (error) { alert('Error: ' + error.message); document.getElementById('addBtn').textContent = 'Add'; return; }
  // Create step rows for new franchisee
  const stepRows = steps.map(s => ({ franchisee_id: data.id, step_id: s.id, completed: false }));
  if (stepRows.length) await sb.from('franchisee_steps').insert(stepRows);
  document.getElementById('a-name').value = '';
  document.getElementById('a-loc').value = '';
  document.getElementById('addBtn').textContent = 'Add';
  closeAdd();
  await loadAll();
}

// ── REMOVE FRANCHISEE ──
async function removeFranchisee(fid) {
  if (!confirm('Remove this franchisee?')) return;
  await sb.from('franchisees').delete().eq('id', fid);
  await loadAll();
}

// ── SETTINGS (EDIT STEPS) ──
function openSettings() {
  renderEditor();
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

function renderEditor() {
  document.getElementById('stepsEditor').innerHTML = steps.map((s, i) => `
    <div class="se-row" draggable="true" data-idx="${i}" ondragstart="seDS(event,${i})" ondragover="seDO(event)" ondragleave="seDL(event)" ondrop="seDD(event,${i})" ondragend="seDE(event)">
      <div class="se-move"><span></span><span></span><span></span></div>
      <input value="${s.label}" onchange="updateStepLabel('${s.id}',this.value)">
      <span class="se-req ${s.required ? 'active' : ''}" onclick="toggleReq('${s.id}',${!s.required})">${s.required ? 'REQ' : 'opt'}</span>
      <span class="se-del" onclick="deleteStep('${s.id}')">x</span>
    </div>
  `).join('');
}
var _dragIdx = null;
function seDS(e,i){ _dragIdx=i; e.target.closest('.se-row').classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function seDO(e){ e.preventDefault(); var r=e.target.closest('.se-row'); if(r) r.classList.add('drag-over'); }
function seDL(e){ var r=e.target.closest('.se-row'); if(r) r.classList.remove('drag-over'); }
function seDE(e){ document.querySelectorAll('.se-row').forEach(function(r){ r.classList.remove('dragging','drag-over'); }); }
async function seDD(e,ti){
  e.preventDefault();
  document.querySelectorAll('.se-row').forEach(function(r){ r.classList.remove('dragging','drag-over'); });
  if(_dragIdx===null||_dragIdx===ti) return;
  var moved = steps.splice(_dragIdx,1)[0];
  steps.splice(ti,0,moved);
  var updates = steps.map(function(s,i){ return sb.from('checklist_steps').update({sort_order:i+1}).eq('id',s.id); });
  await Promise.all(updates);
  _dragIdx = null;
  await loadAll();
  renderEditor();
}

async function updateStepLabel(sid, label) {
  await sb.from('checklist_steps').update({ label }).eq('id', sid);
  await loadAll();
  renderEditor();
}

async function toggleReq(sid, val) {
  await sb.from('checklist_steps').update({ required: val }).eq('id', sid);
  await loadAll();
  renderEditor();
}

async function deleteStep(sid) {
  if (!confirm('Delete this step for all franchisees?')) return;
  await sb.from('checklist_steps').delete().eq('id', sid);
  await loadAll();
  renderEditor();
}

async function addNewStep() {
  const inp = document.getElementById('newStepInput');
  const label = inp.value.trim();
  if (!label) return;
  const maxOrder = steps.length ? Math.max(...steps.map(s => s.sort_order)) : 0;
  const { data } = await sb.from('checklist_steps').insert({ label, required: false, sort_order: maxOrder + 1 }).select().single();
  // Add step rows for all existing franchisees
  if (data && franchisees.length) {
    const rows = franchisees.map(f => ({ franchisee_id: f.id, step_id: data.id, completed: false }));
    await sb.from('franchisee_steps').insert(rows);
  }
  inp.value = '';
  await loadAll();
  renderEditor();
}

// ── NOTES ──
async function saveNotes(fid, notes) {
  console.log('saveNotes called:', fid, notes);
  const { error } = await sb.from('franchisees').update({ notes }).eq('id', fid);
  if (error) { console.error('saveNotes error:', error); return; }
  var f = franchisees.find(function(x){ return x.id === fid; });
  if (f) f.notes = notes;
  var el = document.getElementById('ns-' + fid);
  if (el) { el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); }, 2000); }
}

// ── INIT ──
loadAll();
</script>
